<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ABSENSI KPU</title>

<style>

body{
  margin:0;
  padding:20px;
  background:#15834f;
  font-family:Arial;
  color:white;
}

.container{
  max-width:600px;
  margin:auto;
}

.card{
  background:white;
  color:black;
  padding:20px;
  border-radius:20px;
  margin-bottom:20px;
}

h1,h2,h3{
  text-align:center;
}

select,
input,
textarea,
button{
  width:100%;
  padding:15px;
  margin-top:10px;
  margin-bottom:15px;
  border-radius:10px;
  border:none;
  font-size:16px;
}

button{
  background:#15834f;
  color:white;
  font-weight:bold;
}

video,
img{
  width:100%;
  border-radius:20px;
  background:black;
}

.info{
  text-align:center;
  font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>ABSENSI KPU KOTA MALANG</h1>

<!-- LOGIN -->

<div class="card">

<h2>LOGIN</h2>

<select id="loginNama">
<option value="">Pilih Nama</option>
</select>

<input
type="password"
id="loginPassword"
placeholder="Password">

<button onclick="loginPegawai()">
LOGIN
</button>

</div>

<!-- RIWAYAT -->

<div
class="card"
id="riwayatBox"
style="display:none;">

<h3>RIWAYAT HARI INI</h3>

<p>
JAM MASUK :
<b id="jamMasuk">
BELUM ABSEN MASUK
</b>
</p>

<p>
JAM PULANG :
<b id="jamPulang">
BELUM ABSEN PULANG
</b>
</p>

</div>

<!-- ABSEN -->

<div
class="card"
id="absenBox"
style="display:none;">

<select id="jenis">
<option value="WFO">WFO</option>
<option value="WFH">WFH</option>
<option value="DL">DL</option>
<option value="CUTI">CUTI</option>
</select>

<textarea
id="uraian"
placeholder="Uraian tugas">
</textarea>

<textarea
id="output"
placeholder="Output kerja">
</textarea>

<textarea
id="alamat"
placeholder="Alamat">
</textarea>

<video
id="video"
autoplay
playsinline>
</video>

<img
id="preview"
style="display:none;">

<button onclick="ambilFoto()">
AMBIL FOTO
</button>

<button onclick="kirimAbsen()">
KIRIM ABSEN
</button>

</div>

<!-- PASSWORD -->

<div
class="card"
id="passwordBox"
style="display:none;">

<h3>UBAH PASSWORD</h3>

<input
type="password"
id="passwordLama"
placeholder="Password Lama">

<input
type="password"
id="passwordBaru"
placeholder="Password Baru">

<button onclick="ubahPassword()">
UBAH PASSWORD
</button>

</div>

<div
class="info"
id="info">
</div>

</div>

<script>

const API =
"https://script.google.com/macros/s/AKfycbwx1pMmMPnnrjZUBWDAqvD76kV1blXAA74u6R6G4nT5U-txQdHUZyP6en7WZNkBHLIROQ/exec";

let pegawai = [];

let pegawaiLogin = null;

let fotoBase64 = null;

// =====================================================
// INIT
// =====================================================

async function init(){

  const res =
  await fetch(API);

  const data =
  await res.json();

  pegawai =
  data.pegawai || [];

  const select =
  document.getElementById(
    "loginNama"
  );

  pegawai.forEach(p=>{

    const opt =
    document.createElement(
      "option"
    );

    opt.value = p.nama;

    opt.textContent =
    p.nama;

    select.appendChild(opt);

  });

}

init();

// =====================================================
// LOGIN
// =====================================================

async function loginPegawai(){

  try{

    const nama =
    document.getElementById(
      "loginNama"
    ).value;

    const password =
    document.getElementById(
      "loginPassword"
    ).value;

    const res =
    await fetch(
      API +
      "?mode=login" +
      "&nama=" +
      encodeURIComponent(nama) +
      "&password=" +
      encodeURIComponent(password)
    );

    const data =
    await res.json();

    if(data.result==="error"){
      throw new Error(
        data.message
      );
    }

    pegawaiLogin = data;

    document.getElementById(
      "riwayatBox"
    ).style.display =
    "block";

    document.getElementById(
      "absenBox"
    ).style.display =
    "block";

    document.getElementById(
      "passwordBox"
    ).style.display =
    "block";

    await loadRiwayat();

    startCamera();

    alert("Login berhasil");

  }catch(err){

    alert(err.message);

  }

}

// =====================================================
// RIWAYAT
// =====================================================

async function loadRiwayat(){

  const res =
  await fetch(
    API +
    "?mode=riwayat&nip=" +
    pegawaiLogin.nip
  );

  const data =
  await res.json();

  document.getElementById(
    "jamMasuk"
  ).innerText =
  data.jamMasuk;

  document.getElementById(
    "jamPulang"
  ).innerText =
  data.jamPulang;

}

// =====================================================
// CAMERA
// =====================================================

async function startCamera(){

  const stream =
  await navigator
  .mediaDevices
  .getUserMedia({
    video:true,
    audio:false
  });

  document
  .getElementById(
    "video"
  ).srcObject =
  stream;

}

// =====================================================
// FOTO
// =====================================================

function ambilFoto(){

  const video =
  document.getElementById(
    "video"
  );

  const canvas =
  document.createElement(
    "canvas"
  );

  canvas.width =
  video.videoWidth;

  canvas.height =
  video.videoHeight;

  const ctx =
  canvas.getContext("2d");

  ctx.drawImage(
    video,
    0,
    0
  );

  fotoBase64 =
  canvas.toDataURL(
    "image/png"
  );

  const preview =
  document.getElementById(
    "preview"
  );

  preview.src =
  fotoBase64;

  preview.style.display =
  "block";

  video.style.display =
  "none";

}

// =====================================================
// ABSEN
// =====================================================

async function kirimAbsen(){

  try{

    if(!fotoBase64){

      alert(
        "Ambil foto dulu"
      );

      return;

    }

    const now =
    new Date();

    const jam =
    now.toLocaleTimeString(
      "id-ID",
      {
        hour12:false,
        hour:"2-digit",
        minute:"2-digit",
        timeZone:
        "Asia/Jakarta"
      }
    );

    const status =
    jam < "12:00"
    ? "MASUK"
    : "PULANG";

    const form =
    new FormData();

    form.append(
      "nama",
      pegawaiLogin.nama
    );

    form.append(
      "nip",
      pegawaiLogin.nip
    );

    form.append(
      "jenis",
      document.getElementById(
        "jenis"
      ).value
    );

    form.append(
      "status",
      status
    );

    form.append(
      "jam",
      jam
    );

    form.append(
      "foto",
      fotoBase64
    );

    form.append(
      "jabatan",
      pegawaiLogin.jabatan
    );

    form.append(
      "atasan",
      pegawaiLogin.atasan
    );

    form.append(
      "uraian_tugas",
      document.getElementById(
        "uraian"
      ).value
    );

    form.append(
      "output",
      document.getElementById(
        "output"
      ).value
    );

    form.append(
      "alamat",
      document.getElementById(
        "alamat"
      ).value
    );

    const res =
    await fetch(
      API,
      {
        method:"POST",
        body:form
      }
    );

    const data =
    await res.json();

    if(data.result==="error"){

      throw new Error(
        data.message
      );

    }

    alert(
      "Absensi berhasil"
    );

    fotoBase64 = null;

    document.getElementById(
      "preview"
    ).style.display =
    "none";

    document.getElementById(
      "video"
    ).style.display =
    "block";

    loadRiwayat();

  }catch(err){

    alert(err.message);

  }

}

// =====================================================
// PASSWORD
// =====================================================

async function ubahPassword(){

  try{

    const passwordLama =
    document.getElementById(
      "passwordLama"
    ).value;

    const passwordBaru =
    document.getElementById(
      "passwordBaru"
    ).value;

    const res =
    await fetch(
      API +
      "?mode=ubahpassword" +
      "&nama=" +
      encodeURIComponent(
        pegawaiLogin.nama
      ) +
      "&password_lama=" +
      encodeURIComponent(
        passwordLama
      ) +
      "&password_baru=" +
      encodeURIComponent(
        passwordBaru
      )
    );

    const data =
    await res.json();

    if(data.result==="error"){

      throw new Error(
        data.message
      );

    }

    alert(
      "Password berhasil diubah"
    );

  }catch(err){

    alert(err.message);

  }

}

</script>

</body>
</html>
