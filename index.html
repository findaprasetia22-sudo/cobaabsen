<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Absensi KPU Kota Malang</title>
  <style>
    :root {
      --bg-masuk: #15834f;
      --bg-pulang: #c73d3d;
      --card: rgba(255, 255, 255, 0.16);
      --input-bg: #ffffff;
      --input-text: #1f2937;
      --label: #ffffff;
      --muted: rgba(255,255,255,0.95);
      --warning: #fff3cd;
      --shadow: 0 8px 20px rgba(0,0,0,0.18);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 16px;
      color: white;
      transition: background 0.3s ease;
    }

    body.masuk {
      background: var(--bg-masuk);
    }

    body.pulang {
      background: var(--bg-pulang);
    }

    .container {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
    }

    .page-title {
      font-size: 34px;
      line-height: 1.2;
      font-weight: 800;
      text-align: center;
      margin: 8px 0 10px;
      letter-spacing: 0.3px;
    }

    .online-text {
      text-align: center;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      color: white;
    }

    .status-card {
      background: var(--card);
      border-radius: 24px;
      padding: 20px 18px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 18px;
    }

    .status-main {
      font-size: 32px;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .clock-text {
      font-size: 25px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .warning-text {
      font-size: 20px;
      line-height: 1.45;
      font-weight: 800;
      color: var(--warning);
      min-height: 30px;
      white-space: pre-wrap;
    }

    .closed-card {
      display: none;
      background: rgba(0, 0, 0, 0.18);
      border-radius: 24px;
      padding: 24px 18px;
      box-shadow: var(--shadow);
      text-align: center;
      margin-bottom: 18px;
    }

    .closed-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .closed-message {
      font-size: 22px;
      line-height: 1.5;
      font-weight: 700;
      white-space: pre-wrap;
    }

    .section-card {
      background: transparent;
      border-radius: 20px;
      margin-top: 8px;
    }

    .field {
      margin-bottom: 18px;
      text-align: left;
    }

    .field label {
      display: block;
      font-size: 24px;
      font-weight: 800;
      color: var(--label);
      margin-bottom: 10px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      border: 3px solid rgba(0,0,0,0.25);
      border-radius: 22px;
      background: var(--input-bg);
      color: var(--input-text);
      padding: 20px 22px;
      font-size: 24px;
      line-height: 1.35;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(0,0,0,0.04);
    }

    .field input[readonly] {
      background: #f2f2f2;
      color: #333;
    }

    .field textarea {
      min-height: 120px;
      resize: vertical;
    }

    .sub-title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin: 24px 0 14px;
    }

    .camera-box {
      width: 100%;
      background: rgba(255,255,255,0.12);
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--shadow);
      padding: 10px;
    }

    video, img {
      display: block;
      width: 100%;
      border-radius: 18px;
      background: #111;
      min-height: 240px;
      object-fit: cover;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 22px;
      padding: 20px 18px;
      font-size: 28px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: var(--shadow);
    }

    .btn-primary {
      background: #ffffff;
      color: #111827;
    }

    .btn-secondary {
      background: #facc15;
      color: #111827;
    }

    .btn-success {
      background: #0f172a;
      color: #ffffff;
    }

    .submit-info {
      margin-top: 18px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .helper-text {
      text-align: center;
      font-size: 18px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
    }

    @media (min-width: 640px) {
      body {
        padding: 24px;
      }

      .btn-grid {
        grid-template-columns: 1fr 1fr 1fr;
      }

      .field label {
        font-size: 22px;
      }

      .field input,
      .field select,
      .field textarea {
        font-size: 22px;
      }
    }
  </style>
</head>
<body class="masuk">
  <div class="container">
    <div class="page-title">ABSENSI KPU KOTA MALANG</div>
    <div class="online-text" id="networkInfo">Online</div>

    <div class="status-card">
      <div class="status-main" id="statusText">🟢 MASUK</div>
      <div class="clock-text" id="jamText">00.00.00</div>
      <div class="warning-text" id="warningTerlambat"></div>
    </div>

    <div class="closed-card" id="closedBox">
      <div class="closed-title">LAYANAN ABSENSI TUTUP</div>
      <div class="closed-message" id="closedMessage"></div>
    </div>

    <div class="section-card" id="mainFormBox">
      <div class="field">
        <label for="nama">NAMA</label>
        <select id="nama">
          <option value="">-- Pilih Nama --</option>
        </select>
      </div>

      <div class="field">
        <label for="nip">NIP</label>
        <input type="text" id="nip" readonly />
      </div>

      <div class="field">
        <label for="jenisAbsen">JENIS ABSEN</label>
        <select id="jenisAbsen">
          <option value="WFO" selected>WFO</option>
          <option value="WFA">WFA</option>
          <option value="WFH">WFH</option>
          <option value="CUTI">CUTI</option>
          <option value="DL">DL</option>
          <option value="SAKIT">SAKIT</option>
          <option value="IJIN">IJIN</option>
        </select>
      </div>

      <div id="formPulang" style="display:none;">
        <div class="field">
          <label for="jabatan">JABATAN</label>
          <input type="text" id="jabatan" readonly />
        </div>

        <div class="field">
          <label for="atasan">ATASAN</label>
          <input type="text" id="atasan" readonly />
        </div>

        <div class="field">
          <label for="uraianTugas">URAIAN TUGAS</label>
          <textarea id="uraianTugas" placeholder="Tulis uraian tugas di sini"></textarea>
        </div>

        <div class="field">
          <label for="outputKerja">OUTPUT</label>
          <textarea id="outputKerja" placeholder="Tulis output pekerjaan di sini"></textarea>
        </div>

        <div class="field">
          <label for="alamat">ALAMAT</label>
          <textarea id="alamat" placeholder="Tulis alamat di sini"></textarea>
        </div>
      </div>

      <div class="sub-title">AMBIL SELFIE</div>

      <div class="camera-box">
        <video id="video" autoplay playsinline></video>
        <img id="preview" alt="Preview Foto" style="display:none;" />
      </div>

      <div class="helper-text">
        Pastikan wajah terlihat jelas sebelum menekan tombol kirim.
      </div>

      <div class="btn-grid">
        <button type="button" class="btn-primary" onclick="ambilFoto()">AMBIL FOTO</button>
        <button type="button" class="btn-secondary" onclick="ulangFoto()">ULANG FOTO</button>
        <button type="button" class="btn-success" onclick="kirimAbsen()">KIRIM ABSEN</button>
      </div>

      <div class="submit-info" id="submitInfo"></div>
    </div>
  </div>

  <script>
    const API = "https://script.google.com/macros/s/AKfycbwx1pMmMPnnrjZUBWDAqvD76kV1blXAA74u6R6G4nT5U-txQdHUZyP6en7WZNkBHLIROQ/exec";
    const SESSION_MS = 5 * 60 * 1000;

    let pegawai = [];
    let config = {};
    let fotoBase64 = null;
    let sessionTimer = null;

    const nama = document.getElementById("nama");
    const nip = document.getElementById("nip");
    const jabatan = document.getElementById("jabatan");
    const atasan = document.getElementById("atasan");
    const jenisAbsen = document.getElementById("jenisAbsen");
    const uraianTugas = document.getElementById("uraianTugas");
    const outputKerja = document.getElementById("outputKerja");
    const alamat = document.getElementById("alamat");
    const formPulang = document.getElementById("formPulang");
    const statusText = document.getElementById("statusText");
    const jamText = document.getElementById("jamText");
    const warningTerlambat = document.getElementById("warningTerlambat");
    const video = document.getElementById("video");
    const preview = document.getElementById("preview");
    const submitInfo = document.getElementById("submitInfo");
    const networkInfo = document.getElementById("networkInfo");
    const closedBox = document.getElementById("closedBox");
    const closedMessage = document.getElementById("closedMessage");
    const mainFormBox = document.getElementById("mainFormBox");

    function updateNetworkInfo() {
      networkInfo.innerText = navigator.onLine ? "Online" : "Offline";
    }

    window.addEventListener("online", updateNetworkInfo);
    window.addEventListener("offline", updateNetworkInfo);

    function getConfigTime(key, fallback) {
      const val = String(config[key] || "").trim();
      return /^\d{2}:\d{2}$/.test(val) ? val : fallback;
    }

    function timeToMinutes(hhmm) {
      const parts = String(hhmm || "00:00").replace(/\./g, ":").split(":");
      const h = Number(parts[0] || 0);
      const m = Number(parts[1] || 0);
      return (h * 60) + m;
    }

    function minutesToTime(totalMinutes) {
      let h = Math.floor(totalMinutes / 60);
      let m = totalMinutes % 60;
      h = ((h % 24) + 24) % 24;
      return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
    }

    function getHariJakarta() {
      return new Intl.DateTimeFormat("id-ID", {
        weekday: "long",
        timeZone: "Asia/Jakarta"
      }).format(new Date()).toLowerCase();
    }

    function getJamPulangResmi() {
      const hari = getHariJakarta();

      if (hari === "senin" || hari === "selasa" || hari === "rabu" || hari === "kamis") {
        return getConfigTime("jam_pulang_senin_kamis", "16:00");
      }

      if (hari === "jumat") {
        return getConfigTime("jam_pulang_jumat", "16:30");
      }

      return getConfigTime("jam_pulang_senin_kamis", "16:00");
    }

    function getStatusSekarang() {
      const now = new Date();
      const jamShort = now.toLocaleTimeString("id-ID", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "Asia/Jakarta"
      });

      const batasGantiForm = getConfigTime("batas_ganti_form", "12:00");
      return jamShort < batasGantiForm ? "MASUK" : "PULANG";
    }

    function hitungTerlambatSekarang() {
      const jamSekarang = new Date().toLocaleTimeString("id-ID", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "Asia/Jakarta"
      });

      const jamMasukResmi = getConfigTime("jam_masuk", "07:30");
      const terlambat = timeToMinutes(jamSekarang) - timeToMinutes(jamMasukResmi);
      return terlambat > 0 ? terlambat : 0;
    }

    function getRekomendasiPulang(terlambatMenit) {
      const jamPulangResmi = getJamPulangResmi();
      const total = timeToMinutes(jamPulangResmi) + terlambatMenit;
      return minutesToTime(total);
    }

    function isWebOpenNow() {
      const now = new Date();
      const jamSekarang = now.toLocaleTimeString("id-ID", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "Asia/Jakarta"
      });

      const jamBukaWeb = getConfigTime("jam_buka_web", "06:00");
      const jamTutupWeb = getConfigTime("jam_tutup_web", "18:00");

      const menitSekarang = timeToMinutes(jamSekarang);
      const menitBuka = timeToMinutes(jamBukaWeb);
      const menitTutup = timeToMinutes(jamTutupWeb);

      return menitSekarang >= menitBuka && menitSekarang <= menitTutup;
    }

    function updateWebAvailability() {
      const jamBukaWeb = getConfigTime("jam_buka_web", "06:00");
      const jamTutupWeb = getConfigTime("jam_tutup_web", "18:00");

      const now = new Date();
      const jamSekarang = now.toLocaleTimeString("id-ID", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        timeZone: "Asia/Jakarta"
      });

      const menitSekarang = timeToMinutes(jamSekarang);
      const menitBuka = timeToMinutes(jamBukaWeb);
      const menitTutup = timeToMinutes(jamTutupWeb);

      if (menitSekarang < menitBuka) {
        closedBox.style.display = "block";
        mainFormBox.style.display = "none";
        closedMessage.innerText =
          "Layanan absensi belum buka.\nJam layanan " +
          jamBukaWeb.replace(":", ".") +
          " - " +
          jamTutupWeb.replace(":", ".");
        return;
      }

      if (menitSekarang > menitTutup) {
        closedBox.style.display = "block";
        mainFormBox.style.display = "none";
        closedMessage.innerText =
          "Layanan absensi sudah tutup.\nJam layanan " +
          jamBukaWeb.replace(":", ".") +
          " - " +
          jamTutupWeb.replace(":", ".");
        return;
      }

      closedBox.style.display = "none";
      mainFormBox.style.display = "block";
    }

    function clearFormPulang() {
      uraianTugas.value = "";
      outputKerja.value = "";
      alamat.value = "";
    }

    function isiDataPegawai() {
      const selectedNama = nama.value;
      const p = pegawai.find(x => x.nama === selectedNama);

      if (!p) {
        nip.value = "";
        jabatan.value = "";
        atasan.value = "";
        return;
      }

      nip.value = p.nip || "";
      jabatan.value = p.jabatan || "";
      atasan.value = p.atasan || "";
      resetSessionTimer();
    }

    function updateWarningTerlambat() {
      const status = getStatusSekarang();

      if (status !== "MASUK") {
        warningTerlambat.innerText = "";
        return;
      }

      const terlambat = hitungTerlambatSekarang();

      if (terlambat <= 0) {
        warningTerlambat.innerText = "";
        return;
      }

      if (terlambat > 59) {
        warningTerlambat.innerText = "ANDA MELEBIHI BATAS WAKTU KETERLAMBATAN";
        return;
      }

      warningTerlambat.innerText = "TERLAMBAT " + terlambat + " MENIT";
    }

    function updateTampilanStatus() {
      const now = new Date();
      const jamLengkap = now.toLocaleTimeString("id-ID", {
        hour12: false,
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        timeZone: "Asia/Jakarta"
      });

      const status = getStatusSekarang();
      jamText.innerText = jamLengkap.replace(/:/g, ".");

      if (status === "MASUK") {
        statusText.innerText = "🟢 MASUK";
        document.body.className = "masuk";
        formPulang.style.display = "none";
        clearFormPulang();
      } else {
        statusText.innerText = "🔴 PULANG";
        document.body.className = "pulang";
        formPulang.style.display = "block";
      }

      updateWarningTerlambat();
      updateWebAvailability();
    }

    async function initApp() {
      try {
        updateNetworkInfo();
        submitInfo.innerText = "Memuat data pegawai...";

        const res = await fetch(API, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("Response bukan JSON: " + text.substring(0, 200));
        }

        if (data.result === "error") {
          throw new Error(data.message || "Terjadi kesalahan");
        }

        pegawai = data.pegawai || [];
        config = data.setting || {};

        nama.innerHTML = '<option value="">-- Pilih Nama --</option>';
        pegawai.forEach(p => {
          const o = document.createElement("option");
          o.value = p.nama;
          o.textContent = p.nama;
          nama.appendChild(o);
        });

        submitInfo.innerText = "";
        updateTampilanStatus();
        startRealtime();
        startCamera();
        initSessionAutoRefresh();

      } catch (err) {
        console.error(err);
        submitInfo.innerText = "Gagal memuat data: " + err.message;
        alert("Gagal memuat data:\n" + err.message);
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        video.srcObject = stream;
      } catch (err) {
        console.error(err);
        alert("Kamera tidak bisa diakses: " + err.message);
      }
    }

    function ambilFoto() {
      resetSessionTimer();

      if (!isWebOpenNow()) {
        alert("Layanan absensi sedang tutup.");
        return;
      }

      if (!video.srcObject) {
        alert("Kamera belum siap");
        return;
      }

      const canvas = document.createElement("canvas");
      canvas.width = video.videoWidth || 720;
      canvas.height = video.videoHeight || 1280;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      fotoBase64 = canvas.toDataURL("image/png");
      preview.src = fotoBase64;
      preview.style.display = "block";
      video.style.display = "none";
      submitInfo.innerText = "Foto berhasil diambil";
    }

    function ulangFoto() {
      resetSessionTimer();
      fotoBase64 = null;
      preview.src = "";
      preview.style.display = "none";
      video.style.display = "block";
      submitInfo.innerText = "";
    }

    function initSessionAutoRefresh() {
      resetSessionTimer();

      ["click", "change", "input", "keydown", "touchstart"].forEach(evt => {
        document.addEventListener(evt, resetSessionTimer, { passive: true });
      });
    }

    function resetSessionTimer() {
      clearTimeout(sessionTimer);
      sessionTimer = setTimeout(() => {
        alert("Session habis karena tidak submit dalam 5 menit. Halaman akan di-refresh.");
        location.reload();
      }, SESSION_MS);
    }

    function startRealtime() {
      updateTampilanStatus();
      setInterval(updateTampilanStatus, 1000);
    }

    async function kirimAbsen() {
      try {
        resetSessionTimer();

        if (!navigator.onLine) {
          alert("Perangkat sedang offline");
          return;
        }

        if (!isWebOpenNow()) {
          alert("Layanan absensi sedang tutup.");
          return;
        }

        if (!nama.value) {
          alert("Silakan pilih nama terlebih dahulu");
          return;
        }

        if (!nip.value) {
          alert("NIP belum terisi");
          return;
        }

        if (!fotoBase64) {
          alert("Silakan ambil foto terlebih dahulu");
          return;
        }

        const status = getStatusSekarang();

        if (status === "PULANG") {
          if (!jabatan.value.trim()) {
            alert("Jabatan kosong");
            return;
          }
          if (!atasan.value.trim()) {
            alert("Atasan kosong");
            return;
          }
          if (!uraianTugas.value.trim()) {
            alert("Uraian tugas wajib diisi");
            return;
          }
          if (!outputKerja.value.trim()) {
            alert("Output wajib diisi");
            return;
          }
          if (!alamat.value.trim()) {
            alert("Alamat wajib diisi");
            return;
          }
        }

        submitInfo.innerText = "Mengirim absensi... Mohon tunggu.";

        const jamSekarang = new Date().toLocaleTimeString("id-ID", {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          timeZone: "Asia/Jakarta"
        });

        const form = new FormData();
        form.append("nama", nama.value);
        form.append("nip", nip.value);
        form.append("jenis", jenisAbsen.value || "WFO");
        form.append("status", status);
        form.append("jam", jamSekarang);
        form.append("foto", fotoBase64);
        form.append("jabatan", jabatan.value || "");
        form.append("atasan", atasan.value || "");
        form.append("uraian_tugas", uraianTugas.value.trim());
        form.append("output", outputKerja.value.trim());
        form.append("alamat", alamat.value.trim());

        const res = await fetch(API, {
          method: "POST",
          body: form,
          cache: "no-store"
        });

        if (!res.ok) throw new Error("HTTP " + res.status);

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch (e) {
          throw new Error("Response POST bukan JSON: " + text.substring(0, 200));
        }

        if (data.result === "error") {
          throw new Error(data.message || "Terjadi kesalahan");
        }

        submitInfo.innerText = "Absensi berhasil";

        if (status === "MASUK") {
          const terlambat = Number(data.terlambat || 0);

          if (terlambat > 0 && terlambat <= 59) {
            const rekomendasiPulang = getRekomendasiPulang(terlambat);
            alert(
              "Absensi berhasil.\n" +
              "Anda terlambat " + terlambat + " menit.\n" +
              "Rekomendasi jam pulang " + rekomendasiPulang
            );
          } else if (terlambat > 59) {
            alert(
              "Absensi berhasil.\n" +
              "Anda melebihi batas waktu keterlambatan."
            );
          } else {
            alert("Absensi berhasil.");
          }
        } else {
          alert("Absensi berhasil.");
        }

        location.reload();

      } catch (err) {
        console.error(err);
        submitInfo.innerText = "Gagal: " + err.message;
        alert("Gagal submit:\n" + err.message);
      }
    }

    nama.addEventListener("change", isiDataPegawai);

    updateNetworkInfo();
    initApp();
  </script>
</body>
</html>
